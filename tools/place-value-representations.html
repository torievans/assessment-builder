<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Place Value Representations</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F3F2EF;color:#1A1A2E;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto}
h1{font-size:1.35rem;font-weight:700;margin-bottom:16px}
.panel{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.controls{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6B7280}
input[type=number]{border:1.5px solid #D1D5DB;border-radius:8px;padding:8px 12px;font-size:1.3rem;font-weight:700;width:150px;color:#1A1A2E;outline:none}
input[type=number]:focus{border-color:#7898F0}
.tog-row{display:flex;gap:6px;flex-wrap:wrap}
.tog-btn{border:1.5px solid #D1D5DB;background:#fff;border-radius:8px;padding:7px 14px;font-size:.85rem;font-weight:600;color:#6B7280;cursor:pointer;transition:all .15s}
.tog-btn:hover{border-color:#9CA3AF;color:#374151}
.tog-btn.active{background:#1A1A2E;border-color:#1A1A2E;color:#fff}
.tog-btn.missing-active{background:#6366F1;border-color:#6366F1;color:#fff}
.warn{font-size:.78rem;color:#D97706;margin-top:3px;min-height:1em}
.preview-wrap{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:auto;min-height:180px;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:auto}
.btn-dl{background:#1A1A2E;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-dl:hover{background:#374151}
.color-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.preset-btn{border:1.5px solid #D1D5DB;background:#fff;border-radius:6px;padding:4px 10px;font-size:.78rem;font-weight:600;color:#6B7280;cursor:pointer;transition:all .15s}
.preset-btn:hover{border-color:#9CA3AF;color:#374151}
.preset-btn.active{background:#1A1A2E;border-color:#1A1A2E;color:#fff}
.color-swatch{display:flex;align-items:center;gap:6px}
.color-swatch span{font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6B7280}
input[type=color]{width:36px;height:28px;border:1.5px solid #D1D5DB;border-radius:6px;padding:2px;cursor:pointer;background:none}
.missing-hint{font-size:.78rem;color:#9CA3AF;font-style:italic}
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <h1>Place Value Representations</h1>
    <div class="controls">
      <div class="field">
        <label>Number</label>
        <input type="number" id="pv-num" min="0" step="0.001" value="354" oninput="render()">
        <span class="warn" id="block-warn"></span>
      </div>
      <div class="field">
        <label>Representation</label>
        <div class="tog-row" id="rep-row">
          <button class="tog-btn active" data-rep="blocks"   onclick="setRep(this)">PV Blocks</button>
          <button class="tog-btn"        data-rep="counters" onclick="setRep(this)">PV Counters</button>
          <button class="tog-btn"        data-rep="numbers"  onclick="setRep(this)">Numbers</button>
        </div>
      </div>
      <div class="field">
        <label>Display</label>
        <div class="tog-row" id="mode-row">
          <button class="tog-btn active" data-mode="standalone" onclick="setMode(this)">Standalone</button>
          <button class="tog-btn"        data-mode="grid"       onclick="setMode(this)">PV Grid</button>
          <button class="tog-btn"        data-mode="partwhole"  onclick="setMode(this)">Part-Whole</button>
        </div>
      </div>
      <div class="field" id="eq-field" style="display:none">
        <label>Equation</label>
        <div class="tog-row" id="eq-row">
          <button class="tog-btn active" data-eq="none"   onclick="setEqMode(this)">Parts only</button>
          <button class="tog-btn"        data-eq="before" onclick="setEqMode(this)">1234 = parts</button>
          <button class="tog-btn"        data-eq="after"  onclick="setEqMode(this)">Parts = 1234</button>
        </div>
      </div>
      <div class="field" id="color-field">
        <label>Block colours</label>
        <div class="preset-row" style="display:flex;gap:6px;margin-bottom:8px">
          <button class="preset-btn active" id="preset-counter" onclick="applyPreset('counter',this)">Match counters</button>
          <button class="preset-btn" id="preset-paleblue" onclick="applyPreset('paleblue',this)">Pale blue</button>
        </div>
        <div class="color-row">
          <div class="color-swatch">
            <span>1000s</span>
            <input type="color" id="col-1000" value="#788CB4" oninput="BLK_COLORS[1000]=this.value;clearPreset();render()">
          </div>
          <div class="color-swatch">
            <span>100s</span>
            <input type="color" id="col-100" value="#50B4A0" oninput="BLK_COLORS[100]=this.value;clearPreset();render()">
          </div>
          <div class="color-swatch">
            <span>10s</span>
            <input type="color" id="col-10" value="#F0B478" oninput="BLK_COLORS[10]=this.value;clearPreset();render()">
          </div>
          <div class="color-swatch">
            <span>1s</span>
            <input type="color" id="col-1" value="#C86464" oninput="BLK_COLORS[1]=this.value;clearPreset();render()">
          </div>
        </div>
      </div>
      <div class="field" id="ctr-color-field" style="display:none">
        <label>Counter &amp; grid colours</label>
        <div class="color-row" style="flex-wrap:wrap;gap:10px">
          <div class="color-swatch"><span>M</span><input type="color" id="cc-1000000" value="#288C50" oninput="setPVColor(1000000,this.value)"></div>
          <div class="color-swatch"><span>HTh</span><input type="color" id="cc-100000" value="#50B4C8" oninput="setPVColor(100000,this.value)"></div>
          <div class="color-swatch"><span>TTh</span><input type="color" id="cc-10000" value="#B478B4" oninput="setPVColor(10000,this.value)"></div>
          <div class="color-swatch"><span>Th</span><input type="color" id="cc-1000" value="#788CB4" oninput="setPVColor(1000,this.value)"></div>
          <div class="color-swatch"><span>H</span><input type="color" id="cc-100" value="#50B4A0" oninput="setPVColor(100,this.value)"></div>
          <div class="color-swatch"><span>T</span><input type="color" id="cc-10" value="#F0B478" oninput="setPVColor(10,this.value)"></div>
          <div class="color-swatch"><span>O</span><input type="color" id="cc-1" value="#C86464" oninput="setPVColor(1,this.value)"></div>
          <div class="color-swatch"><span>1/10</span><input type="color" id="cc-tenth" value="#C878B4" oninput="setPVColor(0.1,this.value)"></div>
          <div class="color-swatch"><span>1/100</span><input type="color" id="cc-hundredth" value="#F0B0D4" oninput="setPVColor(0.01,this.value)"></div>
          <div class="color-swatch"><span>1/1000</span><input type="color" id="cc-thousandth" value="#F0A090" oninput="setPVColor(0.001,this.value)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Missing components panel -->
  <div class="panel">
    <div class="field">
      <label>Hide as ?</label>
      <div class="tog-row" id="missing-row">
        <span class="missing-hint">Enter a number to see options</span>
      </div>
    </div>
  </div>

  <div class="preview-wrap"><canvas id="pvc"></canvas></div>
  <button class="btn-dl" onclick="dlPNG()">&#8595; Download PNG</button>
</div>
<script>
// ── State & constants ─────────────────────────────────────────────────────────
let repType = 'blocks', dispMode = 'standalone', numEqMode = 'none';
let missingVals = new Set(); // stores p.val numbers, or the string 'whole'
const FONT = "'Proxima Soft','Nunito','Arial Rounded MT Bold',sans-serif";
const GAP  = 6, PAD = 20;
const CELL = 10;
const DEP  = 4;
const CTR  = 44;
const BLK_PER_ROW = { 1000:3, 100:3, 10:5, 1:5 };
let   BLK_COLORS  = { 1000:'#788CB4', 100:'#50B4A0', 10:'#F0B478', 1:'#C86464' };

const PV = [
  { val:1000000, label:'Millions',          abbr:'M',   color:'#288C50' },
  { val:100000,  label:'Hundred Thousands', abbr:'HTh', color:'#50B4C8' },
  { val:10000,   label:'Ten Thousands',     abbr:'TTh', color:'#B478B4' },
  { val:1000,    label:'Thousands',         abbr:'Th',  color:'#788CB4' },
  { val:100,     label:'Hundreds',          abbr:'H',   color:'#50B4A0' },
  { val:10,      label:'Tens',              abbr:'T',   color:'#F0B478' },
  { val:1,       label:'Ones',              abbr:'O',   color:'#C86464' },
  { val:0.1,     label:'Tenths',            abbr:'t',   color:'#C878B4', frac:'1/10'   },
  { val:0.01,    label:'Hundredths',        abbr:'h',   color:'#F0B0D4', frac:'1/100'  },
  { val:0.001,   label:'Thousandths',       abbr:'th',  color:'#F0A090', frac:'1/1000' },
];

// ── Colour utility ────────────────────────────────────────────────────────────
function adjustColor(hex, factor) {
  let r, g, b;
  if (typeof hex === 'string' && hex.startsWith('#') && hex.length >= 7) {
    r = parseInt(hex.slice(1,3),16);
    g = parseInt(hex.slice(3,5),16);
    b = parseInt(hex.slice(5,7),16);
  } else {
    const m = String(hex).match(/\d+/g);
    [r,g,b] = m ? m.map(Number) : [128,128,128];
  }
  return `rgb(${Math.min(255,Math.round(r*factor))},${Math.min(255,Math.round(g*factor))},${Math.min(255,Math.round(b*factor))})`;
}

function setPVColor(val, color) {
  const pv = PV.find(c => c.val === val);
  if (pv) { pv.color = color; render(); }
}

// ── Question mark placeholder ─────────────────────────────────────────────────
function drawQMark(ctx, x, y, w, h) {
  const R = Math.min(10, w / 4, h / 4);
  ctx.save();
  // Fill
  ctx.fillStyle = '#F3F4F6';
  ctx.beginPath();
  ctx.moveTo(x+R, y);
  ctx.lineTo(x+w-R, y); ctx.quadraticCurveTo(x+w, y, x+w, y+R);
  ctx.lineTo(x+w, y+h-R); ctx.quadraticCurveTo(x+w, y+h, x+w-R, y+h);
  ctx.lineTo(x+R, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-R);
  ctx.lineTo(x, y+R); ctx.quadraticCurveTo(x, y, x+R, y);
  ctx.closePath();
  ctx.fill();
  // Dashed border
  ctx.strokeStyle = '#9CA3AF';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  // ? text
  const fs = Math.max(Math.min(w * 0.45, h * 0.65, 52), 18);
  ctx.font = `bold ${fs}px ${FONT}`;
  ctx.fillStyle = '#6B7280';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', x + w / 2, y + h / 2);
  ctx.restore();
}

// Draw ? in a circle (for part-whole circles)
function drawQMarkCircle(ctx, cx, cy, r) {
  ctx.font = `bold ${Math.max(r * 0.7, 20)}px ${FONT}`;
  ctx.fillStyle = '#6B7280';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', cx, cy);
}

// ── 3-D block drawing ─────────────────────────────────────────────────────────
function drawBlock(ctx, bx, by, val) {
  const cols  = val >= 100  ? 10 : 1;
  const rows  = val >= 10   ? 10 : 1;
  const depth = val >= 1000 ? 10 : 1;
  const W = cols * CELL;
  const H = rows * CELL;
  const D = depth * DEP;
  const fx = bx, fy = by + D;

  const base  = BLK_COLORS[val] || '#999';
  const topC  = adjustColor(base, 1.30);
  const sideC = adjustColor(base, 0.70);

  ctx.fillStyle = sideC;
  ctx.beginPath();
  ctx.moveTo(fx+W,   fy);
  ctx.lineTo(fx+W+D, fy-D);
  ctx.lineTo(fx+W+D, fy-D+H);
  ctx.lineTo(fx+W,   fy+H);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = topC;
  ctx.beginPath();
  ctx.moveTo(fx,     fy);
  ctx.lineTo(fx+W,   fy);
  ctx.lineTo(fx+W+D, fy-D);
  ctx.lineTo(fx+D,   fy-D);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = base;
  ctx.fillRect(fx, fy, W, H);

  ctx.strokeStyle = '#111111';
  ctx.lineWidth   = 0.55;
  for (let r=1; r<rows; r++) { const ly=fy+r*CELL; ctx.beginPath();ctx.moveTo(fx,ly);ctx.lineTo(fx+W,ly);ctx.stroke(); }
  for (let c=1; c<cols; c++) { const lx=fx+c*CELL; ctx.beginPath();ctx.moveTo(lx,fy);ctx.lineTo(lx,fy+H);ctx.stroke(); }
  for (let c=1; c<cols; c++) { const lx=fx+c*CELL; ctx.beginPath();ctx.moveTo(lx,fy);ctx.lineTo(lx+D,fy-D);ctx.stroke(); }
  for (let d=1; d<depth; d++) { const ox=d*DEP,oy=-d*DEP; ctx.beginPath();ctx.moveTo(fx+ox,fy+oy);ctx.lineTo(fx+W+ox,fy+oy);ctx.stroke(); }
  for (let r=1; r<rows; r++) { const ly=fy+r*CELL; ctx.beginPath();ctx.moveTo(fx+W,ly);ctx.lineTo(fx+W+D,ly-D);ctx.stroke(); }
  for (let d=1; d<depth; d++) { const ox=d*DEP,oy=-d*DEP; ctx.beginPath();ctx.moveTo(fx+W+ox,fy+oy);ctx.lineTo(fx+W+ox,fy+oy+H);ctx.stroke(); }

  // Outlines — outer silhouette + internal ridges (no edge drawn twice)
  ctx.strokeStyle = '#111111';
  ctx.lineWidth   = 1.0;
  // Outer silhouette of the whole 3D shape
  ctx.beginPath();
  ctx.moveTo(fx+D,   fy-D);
  ctx.lineTo(fx+W+D, fy-D);
  ctx.lineTo(fx+W+D, fy-D+H);
  ctx.lineTo(fx+W,   fy+H);
  ctx.lineTo(fx,     fy+H);
  ctx.lineTo(fx,     fy);
  ctx.closePath(); ctx.stroke();
  // Internal ridge: top edge of front face
  ctx.beginPath(); ctx.moveTo(fx,   fy); ctx.lineTo(fx+W,   fy);    ctx.stroke();
  // Internal ridge: right edge of front face
  ctx.beginPath(); ctx.moveTo(fx+W, fy); ctx.lineTo(fx+W,   fy+H);  ctx.stroke();
  // Internal ridge: diagonal top-right corner
  ctx.beginPath(); ctx.moveTo(fx+W, fy); ctx.lineTo(fx+W+D, fy-D);  ctx.stroke();
}

function oneBlkBounds(val) {
  const cols  = val >= 100  ? 10 : 1;
  const rows  = val >= 10   ? 10 : 1;
  const depth = val >= 1000 ? 10 : 1;
  return { w: cols*CELL + depth*DEP, h: rows*CELL + depth*DEP };
}

function blkSize(val, count) {
  if (!count) return {w:0,h:0};
  const {w:bw, h:bh} = oneBlkBounds(val);
  const perRow = BLK_PER_ROW[val] || 5;
  return {
    w: Math.min(count,perRow)*(bw+GAP)-GAP,
    h: Math.ceil(count/perRow)*(bh+GAP)-GAP,
  };
}

function drawBlks(ctx, x, y, val, count) {
  const {w:bw, h:bh} = oneBlkBounds(val);
  const perRow = BLK_PER_ROW[val] || 5;
  for (let i=0; i<count; i++) {
    const c=i%perRow, r=Math.floor(i/perRow);
    drawBlock(ctx, x+c*(bw+GAP), y+r*(bh+GAP), val);
  }
}

// ── Counter drawing ───────────────────────────────────────────────────────────
function ctrSize(count, perRow) {
  if (!count) return {w:0,h:0};
  perRow = perRow||2;
  const cols=Math.min(count,perRow), rows=Math.ceil(count/perRow);
  return { w:cols*(CTR+GAP)-GAP, h:rows*(CTR+GAP)-GAP };
}

function drawCtrs(ctx, x, y, val, count, perRow) {
  const pv = PV.find(c=>c.val===val) || {color:'#888',abbr:'?'};
  const R=CTR/2;
  perRow = perRow||2;
  for (let i=0; i<count; i++) {
    const col=i%perRow, row=Math.floor(i/perRow);
    const cx=x+col*(CTR+GAP)+R, cy=y+row*(CTR+GAP)+R;
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.fillStyle=pv.color; ctx.fill();
    ctx.strokeStyle=adjustColor(pv.color,0.65); ctx.lineWidth=1.5; ctx.stroke();
    const txt = pv.val < 1 ? String(pv.val) : pv.abbr;
    const fs = txt.length >= 5 ? 8 : txt.length >= 4 ? 9 : txt.length > 2 ? 10 : txt.length > 1 ? 12 : 15;
    ctx.font=`bold ${fs}px ${FONT}`; ctx.fillStyle='#fff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(txt,cx,cy);
  }
}

// ── Number text ───────────────────────────────────────────────────────────────
function numSize(ctx, val, count) {
  if (!count) return {w:0,h:0};
  ctx.font=`bold 32px ${FONT}`;
  const product = Math.round(val * count * 1e6) / 1e6;
  return { w:ctx.measureText(String(product)).width+16, h:44 };
}
function drawNumTxt(ctx, cx, cy, val, count, color) {
  ctx.font=`bold 32px ${FONT}`; ctx.fillStyle=color||'#1A1A2E';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const product = Math.round(val * count * 1e6) / 1e6;
  ctx.fillText(String(product),cx,cy);
}

// Draw full number with each digit coloured to match its place value
function drawColoredNum(ctx, n, parts, bx, cy) {
  const numStr = String(n);
  ctx.font = `bold 32px ${FONT}`;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  const colMap = {};
  parts.forEach(p => { colMap[Math.round(p.val * 1e6)] = p.color; });
  const dotIdx = numStr.indexOf('.');
  const intLen  = dotIdx >= 0 ? dotIdx : numStr.length;
  let dx = bx + 8;
  numStr.split('').forEach((ch, i) => {
    let color = '#1A1A2E';
    if (ch === '.') {
      color = '#9CA3AF';
    } else if (ch !== '-') {
      let pv;
      if (i < intLen) {
        pv = Math.pow(10, intLen - 1 - i);
      } else {
        const decPos = i - intLen - 1;
        pv = Math.round(Math.pow(10, -(decPos + 1)) * 1e6) / 1e6;
      }
      color = colMap[Math.round(pv * 1e6)] || '#1A1A2E';
    }
    ctx.fillStyle = color;
    ctx.fillText(ch, dx, cy);
    dx += ctx.measureText(ch).width;
  });
}

// ── Section sizing / drawing dispatch ─────────────────────────────────────────
function secSize(ctx, col, count, ctrPerRow) {
  if (repType==='blocks')   return blkSize(col.val, count);
  if (repType==='counters') return ctrSize(count, ctrPerRow);
  return numSize(ctx, col.val, count);
}
function drawContent(ctx, col, count, x, y, ctrPerRow) {
  if (repType==='blocks')   { drawBlks(ctx,x,y,col.val,count); return; }
  if (repType==='counters') { drawCtrs(ctx,x,y,col.val,count,ctrPerRow); return; }
  const sz=numSize(ctx,col.val,count);
  drawNumTxt(ctx,x+sz.w/2,y+sz.h/2,col.val,count,col.color);
}

// ── Decompose ─────────────────────────────────────────────────────────────────
function decompose(n, forBlocks) {
  const intPV = PV.filter(p => p.val >= 1);
  const cols = forBlocks ? intPV.slice(-4) : PV;
  let rem = Math.round(Math.max(0, n) * 1000);
  return cols.map(c => {
    const cVal = Math.round(c.val * 1000);
    const count = Math.floor(rem / cVal);
    rem -= count * cVal;
    return {...c, count};
  });
}

// ── Canvas setup ──────────────────────────────────────────────────────────────
function setupCanvas(cv, logW, logH, scale) {
  cv.width=logW*scale; cv.height=logH*scale;
  if (cv.id==='pvc') { cv.style.width=logW+'px'; cv.style.height=logH+'px'; }
  const ctx=cv.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(scale,scale);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,logW,logH);
  return ctx;
}

// ── Standalone ────────────────────────────────────────────────────────────────
function renderStandalone(cv, parts, n, scale) {
  const active = parts.filter(p => p.count > 0);
  const tmp = document.createElement('canvas').getContext('2d');
  if (!active.length) { setupCanvas(cv,400,120,scale); return; }
  const sizes = active.map(p => secSize(tmp, p, p.count));
  const maxH = Math.max(...sizes.map(s => s.h));
  let plusW = 0, eqW = 0, numW = 0;
  if (repType==='numbers') {
    tmp.font=`bold 28px ${FONT}`; plusW=tmp.measureText(' + ').width;
    if (numEqMode!=='none') {
      tmp.font=`bold 32px ${FONT}`; numW=tmp.measureText(String(n)).width+16;
      tmp.font=`bold 28px ${FONT}`; eqW=tmp.measureText(' = ').width;
    }
  }
  const SEC_GAP = repType==='numbers' ? 0 : 28;
  let totalW = PAD*2;
  if (repType==='numbers' && numEqMode!=='none') totalW += numW + eqW;
  sizes.forEach((sz,i) => { totalW += sz.w + (i>0 ? (repType==='numbers' ? plusW : SEC_GAP) : 0); });
  const logW = Math.max(totalW,300), logH = Math.max(maxH+PAD*2,100);
  const ctx = setupCanvas(cv, logW, logH, scale);
  let cx = PAD;

  if (repType==='numbers' && numEqMode==='before') {
    drawColoredNum(ctx,n,parts,cx,PAD+maxH/2); cx+=numW;
    ctx.font=`bold 28px ${FONT}`; ctx.fillStyle='#AAAAAA';
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(' = ',cx,PAD+maxH*0.75); cx+=eqW;
  }

  active.forEach((p,i) => {
    const sz = sizes[i], cy = PAD;
    if (i>0 && repType==='numbers') {
      ctx.font=`bold 28px ${FONT}`; ctx.fillStyle='#AAAAAA';
      ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      ctx.fillText(' + ', cx, cy+sz.h*0.75); cx += plusW;
    } else if (i>0) { cx += SEC_GAP; }
    if (missingVals.has(p.val)) {
      const qh = i > 0 ? sizes[i-1].h : maxH;
      drawQMark(ctx, cx, cy, sz.w, qh);
    } else {
      drawContent(ctx, p, p.count, cx, cy);
    }
    cx += sz.w;
  });

  if (repType==='numbers' && numEqMode==='after') {
    ctx.font=`bold 28px ${FONT}`; ctx.fillStyle='#AAAAAA';
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(' = ',cx,PAD+maxH*0.75); cx+=eqW;
    drawColoredNum(ctx,n,parts,cx,PAD+maxH/2);
  }
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function renderGrid(cv, parts, scale) {
  const nonZeroIdx = parts.reduce((acc,p,i) => (p.count>0 ? [...acc,i] : acc), []);
  let lo, hi;
  if (nonZeroIdx.length===0) {
    lo = hi = parts.findIndex(p=>p.val===1);
    if (lo<0) { lo=0; hi=parts.length-1; }
  } else {
    lo = Math.min(...nonZeroIdx);
    hi = Math.max(...nonZeroIdx);
  }
  const onesIdx = parts.findIndex(p=>p.val===1);
  if (onesIdx>=0 && hi>onesIdx) lo = Math.min(lo, onesIdx);
  parts = parts.slice(lo, hi+1);

  const compact = parts.length > 7;
  const HDR_H=46, CELL_PAD=compact?6:14, MIN_W=compact?72:120;
  const tmp = document.createElement('canvas').getContext('2d');
  const contentSizes = parts.map(p => secSize(tmp, p, Math.max(p.count,1)));
  const colWs = contentSizes.map(sz => Math.max(sz.w+CELL_PAD*2, MIN_W));
  const activeH = parts.filter(p=>p.count>0).map(p => secSize(tmp,p,p.count).h);
  const colH = (activeH.length ? Math.max(...activeH) : 60) + CELL_PAD*2;
  const totalW = colWs.reduce((a,b)=>a+b,0), totalH = HDR_H+colH;
  const logW = Math.max(totalW+2,300), logH = Math.max(totalH+2,200);
  const ctx = setupCanvas(cv, logW, logH, scale);
  let x = 1;
  const decDots = [];
  parts.forEach((p,i) => {
    const cw=colWs[i], isFirst=i===0, isLast=i===parts.length-1, R=8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(x+(isFirst?R:0),1);
    ctx.lineTo(x+cw-(isLast?R:0),1);
    if(isLast) ctx.arcTo(x+cw,1,x+cw,1+R,R); else ctx.lineTo(x+cw,1);
    ctx.lineTo(x+cw,1+HDR_H); ctx.lineTo(x,1+HDR_H);
    if(isFirst){ctx.lineTo(x,1+R);ctx.arcTo(x,1,x+R,1,R);}else ctx.lineTo(x,1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#000000'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if (compact) {
      ctx.font=`bold 12px ${FONT}`;
      ctx.fillText(p.frac||p.abbr, x+cw/2, 1+HDR_H/2);
    } else {
      ctx.font=`bold 15px ${FONT}`;
      const lw = ctx.measureText(p.label).width;
      if (lw > cw-10 && p.label.includes(' ')) {
        const sp = p.label.lastIndexOf(' ');
        ctx.font=`bold 13px ${FONT}`;
        ctx.fillText(p.label.slice(0,sp), x+cw/2, 1+HDR_H/2-8);
        ctx.fillText(p.label.slice(sp+1), x+cw/2, 1+HDR_H/2+8);
      } else {
        ctx.fillText(p.label, x+cw/2, 1+HDR_H/2);
      }
    }
    ctx.fillStyle='#F9FAFB'; ctx.fillRect(x,1+HDR_H,cw,colH);
    if(i<parts.length-1){
      const isDecBound = p.val===1 && parts[i+1] && parts[i+1].val<1;
      ctx.strokeStyle = isDecBound ? '#6B7280' : '#E5E7EB';
      ctx.lineWidth = isDecBound ? 1.5 : 1;
      ctx.beginPath();ctx.moveTo(x+cw,1);ctx.lineTo(x+cw,1+HDR_H+colH);ctx.stroke();
      if(isDecBound) decDots.push(x+cw);
    }
    if (p.count > 0) {
      const sz = secSize(tmp, p, p.count);
      if (missingVals.has(p.val)) {
        const qw = Math.max(sz.w, 60), qh = colH - CELL_PAD*2;
        drawQMark(ctx, x+(cw-qw)/2, 1+HDR_H+CELL_PAD, qw, qh);
      } else if (repType==='numbers') {
        drawNumTxt(ctx, x+cw/2, 1+HDR_H+colH/2, p.val, p.count, p.color);
      } else {
        drawContent(ctx, p, p.count, x+(cw-sz.w)/2, 1+HDR_H+CELL_PAD);
      }
    }
    x += cw;
  });
  // Draw decimal dots last so they sit on top of both adjacent headers
  decDots.forEach(dotX => {
    ctx.fillStyle='#374151';
    // Header dot — centred with label text
    ctx.beginPath();ctx.arc(dotX,1+HDR_H/2,4,0,Math.PI*2);ctx.fill();
    // Content dot — centred in the numbers/content row
    ctx.beginPath();ctx.arc(dotX,1+HDR_H+colH/2,4,0,Math.PI*2);ctx.fill();
  });
}

// ── Part-Whole ────────────────────────────────────────────────────────────────
function renderPartWhole(cv, parts, n, scale) {
  const active = parts.filter(p => p.count > 0);
  const CIRC_PAD=10, MIN_R=55, PART_GAP=12, LINE_LEN=60;
  const tmp = document.createElement('canvas').getContext('2d');
  const partSizes = active.map(p => secSize(tmp, p, p.count, 3));
  const partRs = active.length
    ? active.map((_,i) => Math.max(Math.hypot(partSizes[i].w/2, partSizes[i].h/2)+CIRC_PAD, MIN_R))
    : [MIN_R];
  const maxPartR = Math.max(...partRs);
  tmp.font=`bold 38px ${FONT}`;
  const wholeR = Math.max(tmp.measureText(String(n)).width/2+26, 60);
  const partsTotalW = partRs.reduce((a,r)=>a+r*2,0) + PART_GAP*(Math.max(active.length,1)-1);
  const logW = Math.max(partsTotalW+PAD*2+40, wholeR*2+PAD*2, 360);
  const logH = Math.max(wholeR*2+LINE_LEN+maxPartR*2+PAD*3, 300);
  const ctx = setupCanvas(cv, logW, logH, scale);

  const wholeCY = PAD+wholeR;
  const partCY  = wholeCY+wholeR+LINE_LEN+maxPartR;
  const startX  = (logW-partsTotalW)/2;
  const partCXs = []; let px = startX;
  partRs.forEach(r => { partCXs.push(px+r); px += r*2+PART_GAP; });
  const wholeCX = active.length>0 ? (partCXs[0]+partCXs[partCXs.length-1])/2 : logW/2;

  ctx.strokeStyle='#374151'; ctx.lineWidth=2;
  active.forEach((_,i) => {
    const ang = Math.atan2(partCY-wholeCY, partCXs[i]-wholeCX);
    const sx=wholeCX+wholeR*Math.cos(ang), sy=wholeCY+wholeR*Math.sin(ang);
    const ex=partCXs[i]-partRs[i]*Math.cos(ang), ey=partCY-partRs[i]*Math.sin(ang);
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
  });

  // Whole circle
  ctx.beginPath();ctx.arc(wholeCX,wholeCY,wholeR,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#374151';ctx.lineWidth=2.5;ctx.stroke();
  if (missingVals.has('whole')) {
    drawQMarkCircle(ctx, wholeCX, wholeCY, wholeR);
  } else {
    ctx.font=`bold 38px ${FONT}`;ctx.fillStyle='#1A1A2E';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(n),wholeCX,wholeCY);
  }

  // Part circles
  active.forEach((p,i) => {
    const cx=partCXs[i], r=partRs[i], s=partSizes[i];
    ctx.beginPath();ctx.arc(cx,partCY,r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#374151';ctx.lineWidth=2.5;ctx.stroke();
    if (missingVals.has(p.val)) {
      drawQMarkCircle(ctx, cx, partCY, r);
    } else if (repType==='numbers') {
      drawNumTxt(ctx, cx, partCY, p.val, p.count, p.color);
    } else {
      ctx.save();ctx.beginPath();ctx.arc(cx,partCY,r-4,0,Math.PI*2);ctx.clip();
      drawContent(ctx, p, p.count, cx-s.w/2, partCY-s.h/2, 3);
      ctx.restore();
    }
  });
}

// ── Missing UI ────────────────────────────────────────────────────────────────
function rebuildMissingUI(parts, n) {
  const active = parts.filter(p => p.count > 0);
  // Remove stale vals (no longer in active parts)
  const activeVals = new Set(active.map(p => p.val));
  for (const key of [...missingVals]) {
    if (key === 'whole') { if (dispMode !== 'partwhole') missingVals.delete(key); }
    else if (!activeVals.has(key)) missingVals.delete(key);
  }

  const row = document.getElementById('missing-row');
  const items = [];
  if (dispMode === 'partwhole') items.push({ key: 'whole', label: String(n) });
  active.forEach(p => items.push({ key: p.val, label: p.label }));

  if (!items.length) {
    row.innerHTML = '<span class="missing-hint">Enter a number to see options</span>';
    return;
  }
  row.innerHTML = items.map(item => {
    const isOn = missingVals.has(item.key);
    const cls = isOn ? 'tog-btn missing-active' : 'tog-btn';
    const keyStr = typeof item.key === 'string' ? `'${item.key}'` : item.key;
    return `<button class="${cls}" onclick="toggleMissing(${keyStr})">${item.label}</button>`;
  }).join('');
}

function toggleMissing(key) {
  if (missingVals.has(key)) missingVals.delete(key);
  else missingVals.add(key);
  render();
}

// ── Main render & controls ────────────────────────────────────────────────────
function getCurrentParts() {
  const raw = parseFloat(document.getElementById('pv-num').value) || 0;
  const n = Math.max(0, raw);
  const intPart = Math.floor(n);
  const forBlk = repType === 'blocks';
  const hasDecimals = n !== intPart;
  const inp = document.getElementById('pv-num');
  const warn = document.getElementById('block-warn');

  if (intPart > 9999999) {
    warn.textContent = 'Numbers cannot exceed 7 digits (9,999,999)';
    warn.style.color = '#DC2626';
    inp.style.borderColor = '#DC2626';
    const safeN = 9999999 + (n - intPart);
    return {safeN, parts:decompose(safeN, forBlk)};
  }
  inp.style.borderColor = '';
  if (forBlk && (hasDecimals || n > 9999)) {
    warn.textContent = 'Blocks limited to whole numbers up to 9,999 — showing ' + Math.min(intPart, 9999);
    warn.style.color = '#D97706';
  } else {
    warn.textContent = '';
  }
  const safeN = forBlk ? Math.min(intPart, 9999) : n;
  return {safeN, parts:decompose(safeN, forBlk)};
}

function fitCanvas(cv) {
  const wrap = cv.parentElement;
  const maxW = wrap ? wrap.clientWidth - 40 : 960;
  const natW = parseInt(cv.style.width)  || cv.width;
  const natH = parseInt(cv.style.height) || cv.height;
  if (natW > maxW && maxW > 0) {
    const fit = maxW / natW;
    cv.style.width  = Math.round(natW * fit) + 'px';
    cv.style.height = Math.round(natH * fit) + 'px';
  }
}

function render() {
  const {safeN, parts} = getCurrentParts();
  const scale = Math.min(window.devicePixelRatio||2, 3);
  const cv = document.getElementById('pvc');
  if (dispMode==='standalone') renderStandalone(cv, parts, safeN, scale);
  else if (dispMode==='grid')  renderGrid(cv, parts, scale);
  else                         renderPartWhole(cv, parts, safeN, scale);
  fitCanvas(cv);
  rebuildMissingUI(parts, safeN);
}

function updateEqField() {
  document.getElementById('eq-field').style.display =
    (repType==='numbers' && dispMode==='standalone') ? '' : 'none';
}
function setEqMode(btn) {
  document.querySelectorAll('#eq-row .tog-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); numEqMode=btn.dataset.eq; render();
}
function setRep(btn) {
  document.querySelectorAll('#rep-row .tog-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); repType=btn.dataset.rep;
  document.getElementById('color-field').style.display=repType==='blocks'?'':'none';
  document.getElementById('ctr-color-field').style.display=(repType==='counters'||repType==='numbers')?'':'none';
  updateEqField(); render();
}
function setMode(btn) {
  document.querySelectorAll('#mode-row .tog-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); dispMode=btn.dataset.mode; updateEqField(); render();
}

function dlPNG() {
  const {safeN, parts} = getCurrentParts();
  const cv2 = document.createElement('canvas');
  const EXPORT_SCALE = 3;
  if (dispMode==='standalone') renderStandalone(cv2, parts, safeN, EXPORT_SCALE);
  else if (dispMode==='grid')  renderGrid(cv2, parts, EXPORT_SCALE);
  else                         renderPartWhole(cv2, parts, safeN, EXPORT_SCALE);
  cv2.toBlob(blob => {
    const a = document.createElement('a');
    a.download = `pv-question-${document.getElementById('pv-num').value}-${repType}-${dispMode}.png`;
    a.href = URL.createObjectURL(blob); a.click();
  }, 'image/png');
}

// ── Presets ───────────────────────────────────────────────────────────────────
const PRESETS = {
  counter:  { 1000:'#788CB4', 100:'#50B4A0', 10:'#F0B478', 1:'#C86464' },
  paleblue: { 1000:'#8ABDD8', 100:'#8ABDD8', 10:'#8ABDD8', 1:'#8ABDD8' },
};
function clearPreset() { document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active')); }
function applyPreset(name, btn) {
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const p = PRESETS[name];
  BLK_COLORS = {...p};
  if (p[1000] !== undefined) document.getElementById('col-1000').value = p[1000];
  document.getElementById('col-100').value = p[100];
  document.getElementById('col-10').value  = p[10];
  document.getElementById('col-1').value   = p[1];
  render();
}

render();
</script>
