<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Model Creator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @font-face { font-family: 'Proxima Soft'; src: local('Proxima Soft'); }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: 'Proxima Soft', Nunito, system-ui, sans-serif;
    --bg: #F7F7F8;
    --surface: #FFFFFF;
    --border: #E5E7EB;
    --text: #1F2937;
    --text-muted: #6B7280;
    --accent: #319377;
    --accent-light: #CDE8E1;
    --radius: 12px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 32px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
  }

  header p {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Drop zone */
  #drop-zone {
    max-width: 960px;
    margin: 0 auto 32px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  #drop-zone svg { margin-bottom: 12px; opacity: 0.4; }

  #drop-zone h2 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  #drop-zone p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  #drop-zone input[type="file"] { display: none; }

  .btn {
    display: inline-block;
    padding: 9px 20px;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--border); color: var(--text); }

  /* Toolbar */
  #toolbar {
    max-width: 960px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    display: none;
  }

  #toolbar .file-info {
    flex: 1;
    font-size: 13px;
    color: var(--text-muted);
  }

  #toolbar .file-info strong {
    color: var(--text);
    font-weight: 700;
  }

  /* Grid */
  #grid {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    display: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .q-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .bar-wrap { flex: 1; }
  .q-del-btn { background: none; border: none; cursor: pointer; color: #9CA3AF; font-size: 13px; padding: 3px 6px; border-radius: 5px; line-height: 1; transition: color .12s, background .12s; margin-left: auto; flex-shrink: 0; }
  .q-del-btn:hover { color: #EF4444; background: rgba(239,68,68,.08); }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    padding-top: 4px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .answer-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    border-radius: 6px;
    padding: 2px 8px;
  }

  .mode-badge {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 6px;
    padding: 2px 7px;
  }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .btn-outline:hover { background: var(--accent-light); opacity: 1; }

  header .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  /* Error / empty */
  #message {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
    border-radius: var(--radius);
    font-size: 14px;
    display: none;
  }
  #message.error { background: #FEE2E2; color: #991B1B; }
  #message.info  { background: var(--accent-light); color: var(--accent); }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex;
    background: #F3F4F6;
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    padding: 6px 16px; border-radius: 8px; border: none;
    background: transparent; font-size: 13px; font-weight: 700;
    color: var(--text-muted); cursor: pointer; font-family: var(--font);
    transition: all .15s;
  }
  .mode-btn.active {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  /* ── Manual panel ── */
  #manual-panel {
    display: none;
    max-width: 960px;
    margin: 0 auto 32px;
  }
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .form-row {
    display: flex; gap: 12px; align-items: flex-end; margin-bottom: 18px; flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .field input[type="text"],
  .field input[type="number"] {
    padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: var(--font); color: var(--text);
    background: #fff; transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field-grow { flex: 1; min-width: 140px; }
  .field-sm input { width: 72px; }
  .field-xs input { width: 56px; }

  .tog-row { display: flex; gap: 6px; }
  .tog-btn {
    padding: 6px 13px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; font-size: 13px; font-weight: 700; color: var(--text-muted);
    cursor: pointer; font-family: var(--font); transition: all .15s;
  }
  .tog-btn.active { border-color: var(--accent); background: var(--accent-light); color: #155E4A; }

  .swatch-row { display: flex; gap: 6px; align-items: center; }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: transform .15s, border-color .15s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.selected { border-color: #1A1A2E; transform: scale(1.12); }

  /* Segment rows */
  .seg-block {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 14px 16px 6px; margin-bottom: 14px; background: #FAFAFA;
  }
  .seg-block-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .seg-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  #seg3-block { display: none; }
  .add-seg-btn {
    background: transparent; border: 1.5px dashed var(--border);
    color: var(--text-muted); font-size: 13px; font-weight: 700;
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-family: var(--font); width: 100%; margin-bottom: 18px;
    transition: border-color .15s, color .15s;
  }
  .add-seg-btn:hover { border-color: var(--accent); color: var(--accent); }
  #add-seg-btn { display: block; }
  #remove-seg-btn {
    display: none; background: transparent; border: none;
    color: var(--text-muted); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: var(--font); padding: 0;
  }
  #remove-seg-btn:hover { color: #991B1B; }

  .manual-preview {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 20px; margin-bottom: 20px; background: #FAFAFA;
    min-height: 80px; display: flex; align-items: center; justify-content: center;
  }
  .manual-preview p { font-size: 13px; color: #9CA3AF; }
  .form-actions { display: flex; justify-content: flex-end; }
  .btn-add { background: var(--accent); color: #fff; }
  .section-divider {
    border: none; border-top: 1.5px solid var(--border); margin: 4px 0 20px;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>Bar Model Creator</h1>
      <p id="header-sub">Upload a filled bar-model-template CSV to preview all questions.</p>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-csv-btn" onclick="setMode('csv')">↑ Upload CSV</button>
        <button class="mode-btn" id="mode-manual-btn" onclick="setMode('manual')">✎ Build manually</button>
      </div>
      <button class="btn btn-outline" id="template-btn" onclick="downloadTemplate()">
        ↓ Download template
      </button>
    </div>
  </div>
</header>

<div id="drop-zone">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 16V4m0 0L8 8m4-4 4 4M4 20h16"/>
  </svg>
  <h2>Drop your CSV here</h2>
  <p>Export the bar-model-template.xlsx as CSV, then drop it here<br>or click to browse.</p>
  <label class="btn btn-primary" for="file-input">Choose file</label>
  <input type="file" id="file-input" accept=".csv,.tsv,.txt">
</div>

<div id="toolbar">
  <div class="file-info" id="toolbar-csv-info">Showing <strong id="q-count">0</strong> questions from <strong id="file-name"></strong></div>
  <div class="file-info" id="toolbar-manual-info" style="display:none"><strong id="manual-q-count">0</strong> question(s)</div>
  <button class="btn btn-ghost" id="clear-btn">Clear</button>
</div>

<!-- ── Manual build panel ── -->
<div id="manual-panel">
  <div class="form-card">

    <!-- Q#, text, answer -->
    <div class="form-row">
      <div class="field field-xs">
        <label>Q#</label>
        <input type="number" id="f-qnum" value="1" min="1">
      </div>
      <div class="field field-grow">
        <label>Question text</label>
        <input type="text" id="f-text" placeholder="e.g. What number is missing?">
      </div>
      <div class="field field-sm">
        <label>Answer</label>
        <input type="text" id="f-answer" placeholder="e.g. 6">
      </div>
    </div>

    <!-- Colour, colour mode, total -->
    <div class="form-row">
      <div class="field">
        <label>Colour</label>
        <div class="swatch-row" id="swatch-row"></div>
      </div>
      <div class="field">
        <label>Colour mode</label>
        <div class="tog-row">
          <button class="tog-btn active" data-colmode="single">Single</button>
          <button class="tog-btn" data-colmode="multi">Multi</button>
        </div>
      </div>
      <div class="field">
        <label>Total display</label>
        <div class="tog-row">
          <button class="tog-btn active" data-totdisp="brace">Brace</button>
          <button class="tog-btn" data-totdisp="top bar">Top bar</button>
          <button class="tog-btn" data-totdisp="none">None</button>
        </div>
      </div>
      <div class="field field-sm">
        <label>Total value</label>
        <input type="text" id="f-total" placeholder="e.g. 10 or ?">
      </div>
    </div>

    <hr class="section-divider">

    <!-- Segment 1 -->
    <div class="seg-block" id="seg1-block">
      <div class="seg-block-header">
        <span class="seg-title">Segment 1</span>
        <div class="tog-row">
          <button class="tog-btn active" data-seg="1" data-type="fill">Fill</button>
          <button class="tog-btn" data-seg="1" data-type="blank">Blank</button>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:8px">
        <div class="field field-sm"><label>Value</label><input type="text" id="seg1-val" placeholder="e.g. 4 or ?"></div>
        <div class="field field-grow"><label>Bar label</label><input type="text" id="seg1-seglbl" placeholder="optional"></div>
        <div class="field field-grow"><label>Brace label</label><input type="text" id="seg1-bracelbl" placeholder="optional"></div>
      </div>
    </div>

    <!-- Segment 2 -->
    <div class="seg-block" id="seg2-block">
      <div class="seg-block-header">
        <span class="seg-title">Segment 2</span>
        <div class="tog-row">
          <button class="tog-btn active" data-seg="2" data-type="fill">Fill</button>
          <button class="tog-btn" data-seg="2" data-type="blank">Blank</button>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:8px">
        <div class="field field-sm"><label>Value</label><input type="text" id="seg2-val" placeholder="e.g. 6 or ?"></div>
        <div class="field field-grow"><label>Bar label</label><input type="text" id="seg2-seglbl" placeholder="optional"></div>
        <div class="field field-grow"><label>Brace label</label><input type="text" id="seg2-bracelbl" placeholder="optional"></div>
      </div>
    </div>

    <!-- Segment 3 (hidden by default) -->
    <div class="seg-block" id="seg3-block">
      <div class="seg-block-header">
        <span class="seg-title">Segment 3</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="tog-row">
            <button class="tog-btn active" data-seg="3" data-type="fill">Fill</button>
            <button class="tog-btn" data-seg="3" data-type="blank">Blank</button>
          </div>
          <button id="remove-seg-btn" onclick="toggleSeg3(false)">✕ Remove</button>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:8px">
        <div class="field field-sm"><label>Value</label><input type="text" id="seg3-val" placeholder="e.g. 2 or ?"></div>
        <div class="field field-grow"><label>Bar label</label><input type="text" id="seg3-seglbl" placeholder="optional"></div>
        <div class="field field-grow"><label>Brace label</label><input type="text" id="seg3-bracelbl" placeholder="optional"></div>
      </div>
    </div>

    <button class="add-seg-btn" id="add-seg-btn" onclick="toggleSeg3(true)">+ Add third segment</button>

    <!-- Preview -->
    <div class="manual-preview" id="manual-preview">
      <p>Fill in segment values above to preview.</p>
    </div>

    <div class="form-actions">
      <button class="btn btn-add" onclick="addManualQuestion()">+ Add to page</button>
    </div>

  </div>
</div>

<div id="message"></div>
<div id="grid"></div>

<script>
// ─── Bar model renderer ────────────────────────────────────────────────────
const BOX_COLORS      = ['#D46B55','#F5995B','#FECC6B','#319377','#7898F0','#847AC9','#FC7E91'];
const BAR_LIGHT_FILLS = ['#F9DDD9','#FDE8D4','#FEF5D8','#CDE8E1','#DCE4FD','#DDD9F5','#FEDDEA'];
// Darker hue-matched text colours — all pass WCAG AA 4.5:1 on corresponding BAR_LIGHT_FILLS
const BOX_TEXT_COLORS = ['#7A2E1E','#903F08','#976401','#246E59','#0F2F89','#342C6C','#950319'];
const FONT = "'Proxima Soft',Nunito,sans-serif";

function barModelSVG(config) {
  const { segments, total } = config;
  const globalDivided = !!config.divided;
  const ci = (config.colorIdx ?? 0) % BOX_COLORS.length;
  const FILL = BAR_LIGHT_FILLS[ci], STROKE = BOX_COLORS[ci], TEXT_COLOR = BOX_TEXT_COLORS[ci];
  const BRACE_TIP = 13, BRACE_ARM = 5, H_PAD = 28;
  const BAR_H = 50;
  const TOP_BAR_H = BAR_H, TOP_BAR_GAP = 4;
  const hasBrace = segments.some(sg => (sg.braceLabel ?? sg.label) != null && (sg.braceLabel ?? sg.label) !== '');
  const TOP_PAD = config.topBar ? (14 + TOP_BAR_H + TOP_BAR_GAP) : 50;
  const BOT_PAD = hasBrace ? 50 : 20;
  const knownSum = segments.reduce((s, sg) => s + (typeof sg.value === 'number' ? sg.value : 0), 0);
  const fullTotal = typeof total === 'number' ? total : knownSum;
  const getDivs = sg => sg.divisions ?? (globalDivided && typeof sg.value === 'number' ? sg.value : 1);
  const BAR_W = 340, SVG_W = BAR_W + H_PAD * 2, SVG_H = TOP_PAD + BAR_H + BOT_PAD;
  const bx = H_PAD, by = TOP_PAD;
  const totalLbl = String(total);
  const segWidths = segments.map(sg => {
    const v = typeof sg.value === 'number' ? sg.value : fullTotal - knownSum;
    return (v / fullTotal) * BAR_W;
  });

  let s = `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;

  // Top bar — comparison bar model
  if (config.topBar) {
    const tbY = 14;
    s += `<rect x="${bx}" y="${tbY}" width="${BAR_W}" height="${TOP_BAR_H}" fill="${FILL}" stroke="${STROKE}" stroke-width="2" rx="3"/>`;
    s += `<text x="${(bx + BAR_W / 2).toFixed(1)}" y="${tbY + TOP_BAR_H / 2}" text-anchor="middle" dominant-baseline="central" font-family="${FONT}" font-weight="900" font-size="22" fill="${TEXT_COLOR}">${totalLbl}</text>`;
  }

  // Pass 1: fills + borders
  let cx = bx;
  segments.forEach((sg, i) => {
    const sw = segWidths[i], divs = getDivs(sg);
    const isQ = sg.value === '?';
    // In topBar+multi mode, offset by 1 with skip-2 so no segment matches the top bar colour
    const segCi = config.multi ? (config.topBar ? (ci + 1 + i * 2) : (ci + i * 3)) % BOX_COLORS.length : ci;
    const segFill   = config.multi ? BAR_LIGHT_FILLS[segCi] : FILL;
    const segStroke = config.multi ? BOX_COLORS[segCi]      : STROKE;

    // Blank segments: no fill, no border — skip Pass 1 drawing entirely
    if (sg.blank) { cx += sw; return; }

    if (divs > 1) {
      const divW = sw / divs;
      for (let d = 0; d < divs; d++) {
        s += `<rect x="${(cx + d * divW).toFixed(1)}" y="${by}" width="${divW.toFixed(1)}" height="${BAR_H}" fill="${segFill}" stroke="${segStroke}" stroke-width="1"/>`;
      }
      if (config.multi) {
        const isFirst = i === 0, isLast = i === segments.length - 1;
        const r = 3, sx = cx, sy2 = by + BAR_H, sx2 = cx + sw;
        let pd;
        if (isFirst && isLast) pd = `M${sx+r},${by} H${sx2-r} Q${sx2},${by} ${sx2},${by+r} V${sy2-r} Q${sx2},${sy2} ${sx2-r},${sy2} H${sx+r} Q${sx},${sy2} ${sx},${sy2-r} V${by+r} Q${sx},${by} ${sx+r},${by} Z`;
        else if (isFirst)      pd = `M${sx+r},${by} H${sx2} V${sy2} H${sx+r} Q${sx},${sy2} ${sx},${sy2-r} V${by+r} Q${sx},${by} ${sx+r},${by} Z`;
        else if (isLast)       pd = `M${sx},${by} H${sx2-r} Q${sx2},${by} ${sx2},${by+r} V${sy2-r} Q${sx2},${sy2} ${sx2-r},${sy2} H${sx} V${by} Z`;
        else                   pd = `M${sx},${by} H${sx2} V${sy2} H${sx} Z`;
        s += `<path d="${pd}" fill="none" stroke="${segStroke}" stroke-width="2"/>`;
      }
    } else if (config.multi) {
      const isFirst = i === 0, isLast = i === segments.length - 1;
      const r = 3, x = cx, y2 = by + BAR_H, x2 = cx + sw;
      let d;
      if (isFirst && isLast) d = `M${x+r},${by} H${x2-r} Q${x2},${by} ${x2},${by+r} V${y2-r} Q${x2},${y2} ${x2-r},${y2} H${x+r} Q${x},${y2} ${x},${y2-r} V${by+r} Q${x},${by} ${x+r},${by} Z`;
      else if (isFirst)      d = `M${x+r},${by} H${x2} V${y2} H${x+r} Q${x},${y2} ${x},${y2-r} V${by+r} Q${x},${by} ${x+r},${by} Z`;
      else if (isLast)       d = `M${x},${by} H${x2-r} Q${x2},${by} ${x2},${by+r} V${y2-r} Q${x2},${y2} ${x2-r},${y2} H${x} V${by} Z`;
      else                   d = `M${x},${by} H${x2} V${y2} H${x} Z`;
      s += `<path d="${d}" fill="${segFill}" stroke="${segStroke}" stroke-width="2"/>`;
    } else {
      s += `<rect x="${cx.toFixed(1)}" y="${by}" width="${sw.toFixed(1)}" height="${BAR_H}" fill="${segFill}" stroke="${segStroke}" stroke-width="1"/>`;
    }
    cx += sw;
  });

  // Pass 2: dividers, labels, braces
  cx = bx;
  segments.forEach((sg, i) => {
    const sw = segWidths[i], isQ = sg.value === '?', divs = getDivs(sg);
    const segCi        = config.multi ? (config.topBar ? (ci + 1 + i * 2) : (ci + i * 3)) % BOX_COLORS.length : ci;
    const segStroke    = config.multi ? BOX_COLORS[segCi]      : STROKE;
    const segTextColor = config.multi ? BOX_TEXT_COLORS[segCi] : TEXT_COLOR;

    // Blank segments: skip all drawing except brace — handled at end of loop
    if (sg.blank) {
      const bl = sg.braceLabel ?? sg.label;
      if (bl != null && bl !== '') {
        const x1 = cx, x2 = cx + sw, bY = by + BAR_H + 5, mid = (x1 + x2) / 2;
        s += `<path d="M${x1},${bY} V${bY + BRACE_ARM} H${(mid - 3).toFixed(1)} L${mid},${bY + BRACE_TIP} L${(mid + 3).toFixed(1)},${bY + BRACE_ARM} H${x2} V${bY}" fill="none" stroke="#AAAAAA" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;
        s += `<text x="${mid}" y="${bY + BRACE_TIP + 5}" text-anchor="middle" dominant-baseline="hanging" font-family="${FONT}" font-weight="700" font-size="15" fill="#AAAAAA">${bl}</text>`;
      }
      cx += sw; return;
    }

    // Divider line between segments (single colour mode only, skip if adjacent to blank)
    if (i > 0 && !config.multi && !segments[i - 1]?.blank) {
      s += `<line x1="${cx.toFixed(1)}" y1="${by}" x2="${cx.toFixed(1)}" y2="${by + BAR_H}" stroke="${STROKE}" stroke-width="2.5"/>`;
    }

    if (divs > 1) {
      const divW = sw / divs;
      for (let d = 1; d < divs; d++) {
        s += `<line x1="${(cx + d * divW).toFixed(1)}" y1="${by}" x2="${(cx + d * divW).toFixed(1)}" y2="${by + BAR_H}" stroke="${segStroke}" stroke-width="1"/>`;
      }
      const dl = sg.divLabel;
      if (dl != null && dl !== '') {
        const fs = Math.min(22, Math.max(10, Math.round(divW * 0.55)));
        for (let d = 0; d < divs; d++) {
          s += `<text x="${(cx + (d + 0.5) * divW).toFixed(1)}" y="${by + BAR_H / 2}" text-anchor="middle" dominant-baseline="central" font-family="${FONT}" font-weight="900" font-size="${fs}" fill="${segTextColor}">${dl}</text>`;
        }
      }
    } else {
      // Blank seg label = nothing shown; no fallback to value
      const lbl = sg.segLabel;
      if (lbl != null && lbl !== '') {
        s += `<text x="${(cx + sw / 2).toFixed(1)}" y="${by + BAR_H / 2}" text-anchor="middle" dominant-baseline="central" font-family="${FONT}" font-weight="900" font-size="22" fill="${segTextColor}">${lbl}</text>`;
      }
    }

    const bl = sg.braceLabel ?? sg.label;
    if (bl != null && bl !== '') {
      const x1 = cx, x2 = cx + sw, bY = by + BAR_H + 5, mid = (x1 + x2) / 2;
      s += `<path d="M${x1},${bY} V${bY + BRACE_ARM} H${(mid - 3).toFixed(1)} L${mid},${bY + BRACE_TIP} L${(mid + 3).toFixed(1)},${bY + BRACE_ARM} H${x2} V${bY}" fill="none" stroke="${segStroke}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;
      s += `<text x="${mid}" y="${bY + BRACE_TIP + 5}" text-anchor="middle" dominant-baseline="hanging" font-family="${FONT}" font-weight="700" font-size="15" fill="${segTextColor}">${bl}</text>`;
    }
    cx += sw;
  });

  // Overall bar outline — single colour only (multi mode uses per-segment borders)
  // Groups consecutive non-blank segments so blank segments get no border
  if (!config.multi) {
    let rx = bx, groupStart = null, groupW = 0;
    segments.forEach((sg, i) => {
      const sw = segWidths[i];
      if (!sg.blank) {
        if (groupStart === null) { groupStart = rx; groupW = 0; }
        groupW += sw;
      } else {
        if (groupStart !== null) {
          s += `<rect x="${groupStart.toFixed(1)}" y="${by}" width="${groupW.toFixed(1)}" height="${BAR_H}" fill="none" stroke="${STROKE}" stroke-width="2" rx="3"/>`;
          groupStart = null; groupW = 0;
        }
      }
      rx += sw;
    });
    if (groupStart !== null) {
      s += `<rect x="${groupStart.toFixed(1)}" y="${by}" width="${groupW.toFixed(1)}" height="${BAR_H}" fill="none" stroke="${STROKE}" stroke-width="2" rx="3"/>`;
    }
  }

  // Top brace + total — shown only in 'brace' mode
  if (!config.topBar && !config.hideTotal) {
    const tY = by - 5, tMid = bx + BAR_W / 2;
    s += `<path d="M${bx},${tY} V${tY - BRACE_ARM} H${(tMid - 3).toFixed(1)} L${tMid},${tY - BRACE_TIP} L${(tMid + 3).toFixed(1)},${tY - BRACE_ARM} H${bx + BAR_W} V${tY}" fill="none" stroke="#AAAAAA" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;
    s += `<text x="${tMid}" y="${tY - BRACE_TIP - 4}" text-anchor="middle" dominant-baseline="auto" font-family="${FONT}" font-weight="900" font-size="22" fill="#AAAAAA">${totalLbl}</text>`;
  }
  s += `</svg>`;
  return s;
}

// ─── CSV parsing ───────────────────────────────────────────────────────────
function parseVal(v) {
  if (!v || v.trim() === '') return undefined;
  const t = v.trim();
  if (t === '?') return '?';
  const n = Number(t);
  return isNaN(n) ? t : n;
}

function strVal(v) {
  if (!v || v.trim() === '') return undefined;
  return v.trim();
}

function intVal(v) {
  if (!v || v.trim() === '') return undefined;
  const n = parseInt(v.trim(), 10);
  return isNaN(n) ? undefined : n;
}

function buildSegment(value, segLabel, braceLabel, divisions, divLabel, type) {
  if (value === undefined) return null;
  const seg = { value };
  if (segLabel !== undefined) seg.segLabel = segLabel;
  if (braceLabel !== undefined) seg.braceLabel = braceLabel;
  if (divisions !== undefined) seg.divisions = divisions;
  if (divLabel !== undefined) seg.divLabel = divLabel;
  if (type?.toLowerCase() === 'blank') seg.blank = true;
  return seg;
}

function rowToQuestion(row, colorIdx) {
  // row is an array of strings (PapaParse output)
  const qNum = strVal(row[0]);
  if (!qNum || isNaN(Number(qNum))) return null;

  const text         = strVal(row[1]) || '';
  const total        = parseVal(row[20]);
  const totalDisplay = strVal(row[21])?.toLowerCase() || 'brace'; // 'brace' | 'top bar' | 'none'
  const answer       = strVal(row[22]);
  const multi        = strVal(row[23]) === 'multi';

  const topBar    = totalDisplay === 'top bar';
  const hideTotal = totalDisplay === 'none';

  // Each segment occupies 6 columns: Type, Value, SegLabel, BraceLabel, Divisions, DivLabel
  const seg1 = buildSegment(parseVal(row[3]),  strVal(row[4]),  strVal(row[5]),  intVal(row[6]),  strVal(row[7]),  strVal(row[2]));
  const seg2 = buildSegment(parseVal(row[9]),  strVal(row[10]), strVal(row[11]), intVal(row[12]), strVal(row[13]), strVal(row[8]));
  const seg3 = buildSegment(parseVal(row[15]), strVal(row[16]), strVal(row[17]), intVal(row[18]), strVal(row[19]), strVal(row[14]));

  const segments = [seg1, seg2, seg3].filter(Boolean);
  if (segments.length === 0) return null;

  const cfg = { segments, total: total ?? '?', colorIdx, multi: multi || undefined, topBar: topBar || undefined, hideTotal: hideTotal || undefined };
  return { id: Number(qNum), text, answer, multi, topBar, hideTotal, totalDisplay, cfg };
}

function processCSV(results, fileName) {
  const rows = results.data;
  const questions = [];
  let colorIdx = 0;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const first = String(row[0] || '').trim();
    // Skip header, instruction, separator rows
    if (!first || isNaN(Number(first)) || first.startsWith('↓') || first.startsWith('e.g')) continue;
    const q = rowToQuestion(row, colorIdx % BOX_COLORS.length);
    if (q) { questions.push(q); colorIdx++; }
  }

  return questions;
}

// ─── Rendering ─────────────────────────────────────────────────────────────
function render(questions, fileName) {
  const grid    = document.getElementById('grid');
  const toolbar = document.getElementById('toolbar');
  const msg     = document.getElementById('message');

  msg.style.display = 'none';

  if (questions.length === 0) {
    msg.className = 'info';
    msg.textContent = 'No questions found. Make sure you have filled in rows below the "↓ Add your questions below" marker.';
    msg.style.display = 'block';
    grid.style.display = 'none';
    toolbar.style.display = 'none';
    return;
  }

  document.getElementById('q-count').textContent = questions.length;
  document.getElementById('file-name').textContent = fileName;
  toolbar.style.display = 'flex';

  grid.innerHTML = '';
  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="q-badge">Q${q.id}</span>
        <span class="q-text">${q.text || '—'}</span>
        <button class="q-del-btn" onclick="removeBMCard(this)" title="Remove question">✕</button>
      </div>
      <div class="bar-wrap">${barModelSVG(q.cfg)}</div>
      <div class="card-footer">
        <span>Answer: <span class="answer-badge">${q.answer ?? '—'}</span></span>
        <span class="mode-badge">${q.multi ? 'multi-colour' : 'single colour'}${q.totalDisplay !== 'brace' ? ' · ' + q.totalDisplay : ''}</span>
      </div>`;
    grid.appendChild(card);
  });

  grid.style.display = 'grid';
}

function showError(msg) {
  const el = document.getElementById('message');
  el.className = 'error';
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
}

function handleFile(file) {
  if (!file) return;
  // Clear old content immediately so stale bar models aren't visible while parsing
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('message').style.display = 'none';
  if (!file.name.match(/\.(csv|tsv|txt)$/i)) {
    showError('Please upload a CSV file. Export your bar-model-template.xlsx as CSV first.');
    return;
  }
  Papa.parse(file, {
    skipEmptyLines: false,
    complete(results) {
      try {
        const questions = processCSV(results, file.name);
        render(questions, file.name);
      } catch (e) {
        showError('Could not parse the file: ' + e.message);
      }
    },
    error(err) { showError('Parse error: ' + err.message); }
  });
}

// ─── Template download ─────────────────────────────────────────────────────
function downloadTemplate() {
  const rows = [
    ['Bar Model Questions'],
    [
      'Q#','Question Text',
      'Seg 1 Type','Seg 1 Value','Seg 1 Seg Label','Seg 1 Brace Label','Seg 1 Divisions','Seg 1 Div Label',
      'Seg 2 Type','Seg 2 Value','Seg 2 Seg Label','Seg 2 Brace Label','Seg 2 Divisions','Seg 2 Div Label',
      'Seg 3 Type (opt)','Seg 3 Value (opt)','Seg 3 Seg Label (opt)','Seg 3 Brace Label (opt)','Seg 3 Divisions (opt)','Seg 3 Div Label (opt)',
      'Total','Total Display','Answer','Colour Mode','Check'
    ],
    [
      'e.g. 1, 2, 3','e.g. How many altogether?',
      'fill or blank','value','inside bar (blank = no label)','under brace (blank = no brace)','equal sub-boxes (blank = none)','label in each sub-box (blank = none)',
      'fill or blank','value','inside bar (blank = no label)','under brace (blank = no brace)','equal sub-boxes (blank = none)','label in each sub-box (blank = none)',
      'fill or blank','value','inside bar (blank = no label)','under brace (blank = no brace)','equal sub-boxes (blank = none)','label in each sub-box (blank = none)',
      'value or ?','brace / top bar / none','correct numerical answer','single or multi','auto-checks the maths'
    ],
    ['1','1 + 9 =','fill','1','1','','','','fill','9','9','','','','','','','','','','?','brace','10','single',''],
    ['2','5 = 1 + ?','fill','1','1','','','','blank','4','','?','','','','','','','','','5','top bar','4','single',''],
    ['↓ Add your questions below'],
  ];

  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bar-model-template.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── Event wiring ──────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

// Reset input value before every click so re-uploading the same filename fires change
dropZone.addEventListener('click', e => {
  if (e.target.closest('label')) return; // label already triggers the input directly
  fileInput.value = '';
  fileInput.click();
});
document.querySelector('label[for="file-input"]').addEventListener('click', () => {
  fileInput.value = '';
});

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

function removeBMCard(btn) {
  btn.closest('.card').remove();
  const grid = document.getElementById('grid');
  const remaining = grid.querySelectorAll('.card').length;
  document.getElementById('manual-q-count').textContent = remaining;
  document.getElementById('q-count').textContent = remaining;
  if (remaining === 0) {
    grid.style.display = 'none';
    document.getElementById('toolbar').style.display = 'none';
  }
}

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('message').style.display = 'none';
  if (currentMode === 'csv') { fileInput.value = ''; }
  if (currentMode === 'manual') { nextManualQNum = 1; document.getElementById('f-qnum').value = 1; }
});

// ─── Manual mode ────────────────────────────────────────────────────────────

// State — declared before initManual() to avoid temporal dead zone
let currentMode      = 'csv';
let nextManualQNum   = 1;
let manualColorIdx   = 0;
let manualMulti      = false;
let manualTotalDisp  = 'brace';
let manualSeg3Active = false;
const segTypes       = { 1: 'fill', 2: 'fill', 3: 'fill' };

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-csv-btn').classList.toggle('active', mode === 'csv');
  document.getElementById('mode-manual-btn').classList.toggle('active', mode === 'manual');
  document.getElementById('drop-zone').style.display    = mode === 'csv'    ? '' : 'none';
  document.getElementById('manual-panel').style.display = mode === 'manual' ? 'block' : 'none';
  document.getElementById('header-sub').textContent     = mode === 'csv'
    ? 'Upload a filled bar-model-template CSV to preview all questions.'
    : 'Build bar models one at a time without a spreadsheet.';
  if (mode === 'manual') updateManualPreview();
}

function toggleSeg3(show) {
  manualSeg3Active = show;
  document.getElementById('seg3-block').style.display  = show ? 'block' : 'none';
  document.getElementById('add-seg-btn').style.display = show ? 'none'  : 'block';
  document.getElementById('remove-seg-btn').style.display = show ? 'inline' : 'none';
  updateManualPreview();
}

function readSegVal(raw) {
  if (!raw || raw.trim() === '') return undefined;
  const t = raw.trim();
  if (t === '?') return '?';
  const n = Number(t);
  return isNaN(n) ? t : n;
}

function buildManualSeg(segNum) {
  const val   = readSegVal(document.getElementById(`seg${segNum}-val`).value);
  if (val === undefined) return null;
  const seg   = { value: val };
  const seglbl = document.getElementById(`seg${segNum}-seglbl`).value.trim();
  const bracelbl = document.getElementById(`seg${segNum}-bracelbl`).value.trim();
  if (seglbl)   seg.segLabel   = seglbl;
  if (bracelbl) seg.braceLabel = bracelbl;
  if (segTypes[segNum] === 'blank') seg.blank = true;
  return seg;
}

function getManualConfig() {
  const seg1 = buildManualSeg(1);
  const seg2 = buildManualSeg(2);
  const seg3 = manualSeg3Active ? buildManualSeg(3) : null;
  const segments = [seg1, seg2, seg3].filter(Boolean);
  if (segments.length === 0) return null;

  const totalRaw = document.getElementById('f-total').value.trim();
  const total    = totalRaw === '' ? '?' : (totalRaw === '?' ? '?' : (isNaN(Number(totalRaw)) ? totalRaw : Number(totalRaw)));

  return {
    segments,
    total,
    colorIdx:  manualColorIdx,
    multi:     manualMulti || undefined,
    topBar:    manualTotalDisp === 'top bar' || undefined,
    hideTotal: manualTotalDisp === 'none' || undefined,
  };
}

function updateManualPreview() {
  const box = document.getElementById('manual-preview');
  const cfg = getManualConfig();
  if (!cfg) { box.innerHTML = '<p>Fill in segment values above to preview.</p>'; return; }
  box.innerHTML = `<div class="bar-wrap" style="width:100%">${barModelSVG(cfg)}</div>`;
}

function addManualQuestion() {
  const cfg = getManualConfig();
  if (!cfg) { alert('Please fill in at least one segment value.'); return; }

  const qNum   = parseInt(document.getElementById('f-qnum').value) || nextManualQNum;
  const text   = document.getElementById('f-text').value.trim();
  const answer = document.getElementById('f-answer').value.trim();

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="q-badge">Q${qNum}</span>
      <span class="q-text">${text || '—'}</span>
      <button class="q-del-btn" onclick="removeBMCard(this)" title="Remove question">✕</button>
    </div>
    <div class="bar-wrap">${barModelSVG(cfg)}</div>
    <div class="card-footer">
      <span>Answer: <span class="answer-badge">${answer || '—'}</span></span>
      <span class="mode-badge">${manualMulti ? 'multi-colour' : 'single colour'}${manualTotalDisp !== 'brace' ? ' · ' + manualTotalDisp : ''}</span>
    </div>`;

  const grid = document.getElementById('grid');
  grid.appendChild(card);
  grid.style.display = 'grid';

  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('toolbar-csv-info').style.display    = 'none';
  document.getElementById('toolbar-manual-info').style.display = '';
  document.getElementById('manual-q-count').textContent = grid.querySelectorAll('.card').length;

  nextManualQNum = qNum + 1;
  document.getElementById('f-qnum').value = nextManualQNum;
  document.getElementById('f-text').value    = '';
  document.getElementById('f-answer').value  = '';
}

function initManual() {
  // Colour swatches (maps to BOX_COLORS 0–6)
  const swatchColors = [
    { name:'red',    hex:'#D46B55' },
    { name:'orange', hex:'#F5995B' },
    { name:'yellow', hex:'#FECC6B' },
    { name:'green',  hex:'#319377' },
    { name:'blue',   hex:'#7898F0' },
    { name:'purple', hex:'#847AC9' },
    { name:'pink',   hex:'#FC7E91' },
  ];
  const swatchRow = document.getElementById('swatch-row');
  swatchColors.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'swatch' + (i === 0 ? ' selected' : '');
    btn.style.background = c.hex;
    btn.title = c.name;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#swatch-row .swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      manualColorIdx = i;
      updateManualPreview();
    });
    swatchRow.appendChild(btn);
  });

  // Colour mode toggle
  document.querySelectorAll('.tog-btn[data-colmode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tog-btn[data-colmode]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      manualMulti = btn.dataset.colmode === 'multi';
      updateManualPreview();
    });
  });

  // Total display toggle
  document.querySelectorAll('.tog-btn[data-totdisp]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tog-btn[data-totdisp]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      manualTotalDisp = btn.dataset.totdisp;
      updateManualPreview();
    });
  });

  // Segment type toggles
  document.querySelectorAll('.tog-btn[data-seg]').forEach(btn => {
    btn.addEventListener('click', () => {
      const seg = btn.dataset.seg;
      document.querySelectorAll(`.tog-btn[data-seg="${seg}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      segTypes[seg] = btn.dataset.type;
      updateManualPreview();
    });
  });

  // Live preview on any input change
  ['f-qnum','f-text','f-answer','f-total',
   'seg1-val','seg1-seglbl','seg1-bracelbl',
   'seg2-val','seg2-seglbl','seg2-bracelbl',
   'seg3-val','seg3-seglbl','seg3-bracelbl',
  ].forEach(id => {
    document.getElementById(id)?.addEventListener('input', updateManualPreview);
  });
}

initManual();
</script>
